worker_processes 1;
pid /tmp/nginx.pid;

events {
    accept_mutex on;
}

http {
    include mime.types;

    types {
        application/manifest+json  webmanifest;
    }

    server {
        listen       3000;
        server_name  localhost;

        access_log off;
        error_log off;

        location / {
            root      /usr/share/nginx/html;
            try_files $request_uri /index.html =404;

            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }
    }
}
